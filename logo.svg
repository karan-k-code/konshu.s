      <stop offset="0%" stop-color="#00183400" />
      <stop offset="100%" stop-color="#002d5a00" />
    </linearGradient>
    
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
