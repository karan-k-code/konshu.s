<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kOnshu</title>

    <meta
      name="description"
      content="We're building something awesome. Be first to know when it launches."
    />
    <meta property="og:title" content="Coming Soon — kOnshu" />
    <meta
      property="og:description"
      content="We're building something awesome. Be first to know when it launches."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0ea5e9" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="icon" href="k-log-tr-v1.png" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0b1220; /* page background */
        --card: #0f172a; /* card background */
        --text: #e5e7eb; /* base text */
        --muted: #94a3b8; /* secondary text */
        --brand: #0ea5e9; /* accent color */
        --brand-2: #22d3ee; /* accent gradient second color */
        --ring: rgba(14, 165, 233, 0.35);
        --success: #22c55e;
        --danger: #ef4444;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --card: #ffffff;
          --text: #0f172a;
          --muted: #475569;
          --ring: rgba(14, 165, 233, 0.25);
        }
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        color: var(--text);
        background:
          radial-gradient(
            1200px 800px at 20% 20%,
            rgba(34, 211, 238, 0.09),
            transparent 60%
          ),
          radial-gradient(
            1200px 800px at 80% 30%,
            rgba(14, 165, 233, 0.1),
            transparent 60%
          ),
          linear-gradient(180deg, var(--bg), var(--bg));
        display: grid;
        place-items: center;
        padding: 0.4rem;
      }

      .container {
        width: 100%;
        max-width: 960px;
        margin-bottom: 1.5rem;
      }

      .card {
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.04),
            rgba(255, 255, 255, 0)
          ),
          var(--card);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.35);
        overflow: hidden;
        position: relative;
        isolation: isolate;
      }

      .glow {
        position: absolute;
        inset: -1px;
        background: conic-gradient(
          from 0deg at 50% 50%,
          var(--brand),
          var(--brand-2),
          transparent 60%
        );
        filter: blur(40px);
        opacity: 0.15;
        z-index: -1;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1.25rem 1.25rem 0.75rem;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .logo-badge {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
      }
      .logo-badge > img {
        width: 36px;
        height: 36px;
        object-fit: cover;
      }

      .pill {
        font-size: 0.85rem;
        color: var(--muted);
        border: 1px solid rgba(148, 163, 184, 0.25);
        padding: 0.35rem 0.6rem;
        border-radius: 999px;
      }

      .hero {
        padding: 3.25rem 1.5rem 2rem;
        text-align: center;
      }
      .headline {
        font-size: clamp(2.2rem, 6vw, 3.4rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
        margin: 0 0 1rem;
      }
      .subhead {
        color: var(--muted);
        max-width: 680px;
        margin: 0 auto;
      }

      .card-contern {
        display: grid;
        width: 100%;
        justify-items: center;
        grid-template-columns: repeat(3, 1fr);
      }

      .card_web {
        display: flex;
        width: 200px;
        height: 200px;
        border-radius: 1rem;
        border: 1px solid rgba(148, 163, 184, 0.15);
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.35);
        overflow: hidden;
        cursor: pointer;

        align-items: end;
        justify-content: center;

        background-image: url("/k-log-tr-v1.png"); /* Replace with your image link */
        background-size: cover; /* Ensures the image fills the entire card without stretching */
        background-position: center; /* Centers the image inside the card */
        background-repeat: no-repeat; /* Prevents the image from tiling */
        background-size: 60% auto; /* Adjust the size of the image to fit within the card */

        transition: all 0.2s ease;

        &:hover {
          border-color: rgb(95, 95, 95);
          transform: scale(1.05);
          background-color: #3d3f42a9;
          box-shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
        }
        &:active {
          transform: translateY(1px);
        }
      }

      .card_web span {
        margin-bottom: 1rem;
        padding: 0.25rem 0.75rem;
        background: rgba(255, 255, 255, 0.225);
        color: var(--text);
        font-weight: 600;
        border-radius: 999px;
        font-size: 0.9rem;
        text-align: center;
        width: fit-content;
        margin: 10px 0;
        color: var(--brand);
      }

      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(148, 163, 184, 0.28),
          transparent
        );
        margin: 2rem 1.25rem 0;
      }

      footer {
        padding: 1.25rem;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .socials {
        display: flex;
        gap: 0.5rem;
      }
      .iconbtn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(148, 163, 184, 0.06);
        text-decoration: none;
        color: var(--text);
        transition:
          border 0.2s,
          transform 0.08s ease;
      }
      .iconbtn:hover {
        border-color: var(--brand);
      }
      .iconbtn:active {
        transform: translateY(1px);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }

      @media (max-width: 520px) {
        .notify {
          grid-template-columns: 1fr;
        }
        footer {
          justify-content: center;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card" role="region" aria-labelledby="headline">
        <div class="glow" aria-hidden="true"></div>

        <header>
          <div class="logo" aria-label="YourBrand">
            <div class="logo-badge">
              <img src="./k-log-tr-v1.png" alt="kOnshu Logo" />
            </div>
            <span>kOnshu</span>
          </div>
          <div class="pill">Beta in progress</div>
        </header>

        <div class="hero">
          <h2 id="headline" class="headline">
            We're cooking up something great 🍳
          </h2>
        </div>

        <div class="card-contern">
          <div
            class="card_web"
            onclick="window.open('https://konshu.xyz', '_blank')"
          >
            <span>konshu.xyz</span>
          </div>
          <div
            class="card_web"
            onclick="window.open('https://kcode.konshu.in', '_blank')"
          >
            <span>kcode.konshu.in</span>
          </div>
          <div
            class="card_web"
            onclick="window.open('https://karan.konshu.in', '_blank')"
          >
            <span>karan.konshu.in</span>
          </div>
        </div>

        <div class="divider" aria-hidden="true"></div>

        <footer>
          <small
            >© <span id="year"></span> kOnshu.in. All rights reserved.</small
          >
          <nav class="socials" aria-label="Social links">
            <a
              class="iconbtn"
              href="https://x.com/karan_k_code"
              aria-label="Follow on X/Twitter"
              title="X"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M18.244 2H21l-6.56 7.497L22 22h-6.828l-5.34-6.83L3.6 22H1l7.02-8.02L2 2h6.91l4.82 6.273L18.244 2Zm-1.21 18h1.894L7.06 4H5.07l11.965 16Z"
                />
              </svg>
            </a>
            <a
              class="iconbtn"
              href="https://instagram.com/karan_k_code"
              aria-label="Follow on Instagram"
              title="Instagram"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M7 2h10a5 5 0 015 5v10a5 5 0 01-5 5H7a5 5 0 01-5-5V7a5 5 0 015-5Zm0 2a3 3 0 00-3 3v10a3 3 0 003 3h10a3 3 0 003-3V7a3 3 0 00-3-3H7Zm11 2a1 1 0 110 2 1 1 0 010-2ZM12 7a5 5 0 110 10 5 5 0 010-10Zm0 2a3 3 0 100 6 3 3 0 000-6Z"
                />
              </svg>
            </a>
            <a
              class="iconbtn"
              href="https://www.linkedin.com/in/karan-k-code"
              aria-label="Connect on LinkedIn"
              title="LinkedIn"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5ZM0 8.98h4.99V24H0V8.98Zm7.49 0H12v2.06h.06c.63-1.2 2.17-2.46 4.47-2.46 4.78 0 5.67 3.15 5.67 7.25V24h-4.99v-6.77c0-1.61-.03-3.69-2.25-3.69-2.25 0-2.59 1.76-2.59 3.57V24H7.49V8.98Z"
                />
              </svg>
            </a>
          </nav>
        </footer>
      </section>
    </main>

    <script></script>
  </body>
</html>
